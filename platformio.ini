[env:seeed_xiao_esp32c6]
platform = espressif32
board = seeed_xiao_esp32c6
framework = arduino
lib_deps = lsatan/SmartRC-CC1101-Driver-Lib@^3.0.2
            bblanchon/ArduinoJson@7.4.3
monitor_speed = 115200